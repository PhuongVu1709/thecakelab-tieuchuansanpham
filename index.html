<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Cake Lab — Xác Thực Truy Cập</title>
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#F37021">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#F37021;
    --orange-dark:#CE5F1C;
    --orange-tint:#FDEAD9;
    --blue:#032C7D;
    --cream:#FCF6ED;
    --card:#FFFFFF;
    --ink:#032C7D;
    --line:#EBDFC7;
    --muted:#6B76A0;
    --error:#B84B4B;
    --shadow: 0 8px 24px rgba(3,44,125,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Poppins', sans-serif;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:20px;
  }
  .gate-card{
    background:var(--card);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:36px 30px;
    max-width:380px;
    width:100%;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  .gate-card::after{
    content:"";
    position:absolute;
    right:-60px; top:-80px;
    width:220px; height:220px;
    border-radius:50%;
    background:radial-gradient(circle, var(--orange-tint) 0%, transparent 70%);
    opacity:0.9;
    z-index:0;
  }
  .brand-mark{
    padding:9px 18px;
    border-radius:999px;
    background:var(--orange);
    display:inline-flex; align-items:center; justify-content:center;
    font-weight:700; color:#fff;
    font-size:13px; letter-spacing:0.16em; text-transform:uppercase;
    box-shadow:0 6px 16px rgba(243,112,33,0.35);
    position:relative; z-index:1;
  }
  h1.title{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:22px;
    margin:16px 0 4px;
    position:relative; z-index:1;
  }
  .subtitle{color:var(--muted); margin:0 0 22px; font-size:13.5px; position:relative; z-index:1;}
  form{position:relative; z-index:1;}
  label{
    display:block; text-align:left; font-size:12px; font-weight:700;
    letter-spacing:0.03em; color:var(--ink); text-transform:uppercase; margin-bottom:6px;
  }
  input[type=password], input[type=text]{
    width:100%;
    font-family:'Poppins', sans-serif;
    font-size:15px;
    padding:12px 44px 12px 14px;
    border:1.5px solid var(--line);
    border-radius:10px;
    background:#FFFDF9;
    color:var(--ink);
    outline:none;
  }
  input:focus{ border-color:var(--orange); }
  .input-wrap{position:relative;}
  .toggle-eye{
    position:absolute; right:6px; top:50%; transform:translateY(-50%);
    width:32px; height:32px;
    border:none; background:transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:17px; padding:0;
  }
  .toggle-eye:hover{ color:var(--orange); }
  button.primary{
    margin-top:16px;
    width:100%;
    background:var(--orange); color:#fff; border:none;
    padding:13px 26px; border-radius:999px;
    font-weight:700; font-size:14.5px;
    cursor:pointer;
  }
  button.primary:hover{background:var(--orange-dark);}
  .error-msg{
    min-height:18px;
    margin-top:12px;
    font-size:13px; font-weight:600; color:var(--error);
  }
</style>
</head>
<body>

<div class="gate-card">
  <div class="brand-mark">The Cake Lab</div>
  <h1 class="title">Xác Thực Truy Cập</h1>
  <p class="subtitle">Vui lòng nhập mã xác nhận để tiếp tục</p>
  <form id="gateForm">
    <label for="accessCode">Mã Xác Nhận</label>
    <div class="input-wrap">
      <input type="password" id="accessCode" placeholder="Nhập mã xác nhận..." autocomplete="off" required autofocus>
      <button type="button" class="toggle-eye" id="toggleEyeBtn" aria-label="Hiện/ẩn mã xác nhận">👁</button>
    </div>
    <button type="submit" class="primary">Xác Nhận</button>
    <div class="error-msg" id="errorMsg"></div>
  </form>
</div>

<script>
const ACCESS_CODE = "Thecakelab@123"; // Replace with your actual access code

const form = document.getElementById('gateForm');
const input = document.getElementById('accessCode');
const errorMsg = document.getElementById('errorMsg');
const toggleEyeBtn = document.getElementById('toggleEyeBtn');

toggleEyeBtn.addEventListener('click', () => {
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  toggleEyeBtn.textContent = isHidden ? '🙈' : '👁';
  input.focus();
});

form.addEventListener('submit', (e) => {
  e.preventDefault();
  if (input.value === ACCESS_CODE) {
    sessionStorage.setItem('tcl_authenticated', 'true');
    window.location.href = 'app.html';
  } else {
    errorMsg.textContent = 'Mã xác nhận không đúng. Vui lòng thử lại.';
    input.value = '';
    input.focus();
  }
});
</script>
</body>
</html>
